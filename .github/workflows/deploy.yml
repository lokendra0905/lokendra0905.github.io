# Build and deploy Next.js static export to GitHub Pages
name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # User site at root (e.g. lokendra0905.github.io): must use empty basePath so CSS/JS load correctly
      - name: Build
        env:
          NEXT_PUBLIC_BASE_PATH: ""
        run: npm run build

      - name: Debug - Show build output
        run: |
          echo "=== NEXT_PUBLIC_BASE_PATH was: $NEXT_PUBLIC_BASE_PATH ==="
          echo "=== Repo: ${{ github.event.repository.owner }}/${{ github.event.repository.name }} ==="
          echo "=== Contents of out/ (first 30 items) ==="
          ls -la out/ 2>/dev/null || echo "ERROR: out/ folder not found!"
          echo "=== Check for index.html ==="
          ls -la out/index.html 2>/dev/null || echo "ERROR: out/index.html missing!"
          echo "=== Top-level files in out/ ==="
          find out -maxdepth 1 -type f 2>/dev/null || true

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
